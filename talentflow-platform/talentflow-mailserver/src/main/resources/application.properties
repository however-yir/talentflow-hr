server.port=${TF_MAIL_SERVER_PORT:8082}
spring.mail.host=${TF_MAIL_HOST:smtp.qq.com}
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.password=${TF_MAIL_PASSWORD:}
spring.mail.username=${TF_MAIL_USERNAME:}
spring.mail.port=${TF_MAIL_PORT:587}
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.debug=${TF_MAIL_DEBUG:true}
spring.rabbitmq.username=${TF_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${TF_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.host=${TF_RABBITMQ_HOST:127.0.0.1}
spring.rabbitmq.port=${TF_RABBITMQ_PORT:5672}
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.prefetch=100
spring.redis.host=${TF_REDIS_HOST:127.0.0.1}
spring.redis.port=${TF_REDIS_PORT:6379}
spring.redis.password=${TF_REDIS_PASSWORD:}
spring.redis.database=${TF_REDIS_DATABASE:0}
