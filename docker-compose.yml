version: "3.9"
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: talentflow_hr
      MYSQL_USER: talentflow
      MYSQL_PASSWORD: talentflow-dev-password
      MYSQL_ROOT_PASSWORD: root-password
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
