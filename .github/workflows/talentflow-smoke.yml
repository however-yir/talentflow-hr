name: talentflow-smoke

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Backend tests
        working-directory: talentflow-platform
        run: mvn -B -pl talentflow-server/talentflow-web -am test

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: npm
          cache-dependency-path: talentflow-ui/package-lock.json

      - name: Frontend unit tests
        working-directory: talentflow-ui
        run: |
          npm ci
          npm run test:unit
