name: talentflow-smoke

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: talentflow-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Backend tests
        working-directory: talentflow-platform
        run: mvn -B -ntp -Duser.timezone=Asia/Shanghai -pl talentflow-server/talentflow-web -am clean package -DskipTests

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: talentflow-backend-test-reports
          path: |
            talentflow-platform/**/target/surefire-reports/*.xml
            talentflow-platform/**/target/surefire-reports/*.txt

  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: npm
          cache-dependency-path: talentflow-ui/package-lock.json

      - name: Frontend unit tests
        working-directory: talentflow-ui
        run: |
          npm ci --no-audit --no-fund
          npm run test:unit:ci

      - name: Upload frontend test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: talentflow-frontend-test-results
          path: talentflow-ui/tests/unit/results.json
